<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  
  <!-- Decorative corners -->
  <circle cx="28" cy="28" r="10" fill="url(#accentGrad)" opacity="0.2"/>
  <circle cx="172" cy="172" r="10" fill="url(#accentGrad)" opacity="0.2"/>
  
  <!-- Main box (found/lost item container) -->
  <g filter="url(#shadow)">
    <rect x="48" y="64" width="104" height="78" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linejoin="round"/>
  </g>
  
  <!-- Box lid (open indicator) -->
  <g filter="url(#shadow)">
    <path d="M 48 64 L 100 44 L 152 64" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  
  <!-- Heart inside box (reunite symbol) -->
  <g transform="translate(100, 105)">
    <path d="M 0,-6 C -6,-12 -14,-12 -14,-4 C -14,2 -9,10 0,15 C 9,10 14,2 14,-4 C 14,-12 6,-12 0,-6 Z" 
          fill="#ffffff" opacity="0.95" filter="url(#shadow)"/>
  </g>
  
  <!-- Magnifying glass (search element) - top right -->
  <g filter="url(#shadow)">
    <circle cx="148" cy="68" r="7" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
    <line x1="155" y1="75" x2="161" y2="81" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="45" y1="162" x2="155" y2="162" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>